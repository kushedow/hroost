<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASQL Интервью - Тренажер с ИИ</title>
    <!-- Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- Vue Demi (Required for Pinia in global builds) -->
    <script src="https://unpkg.com/vue-demi@0.14.7/lib/index.iife.js"></script>
    <!-- Pinia (Global Build) -->
    <script src="https://unpkg.com/pinia@2.1.7/dist/pinia.iife.js"></script>
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        [v-cloak] { display: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <div id="app" v-cloak>
        <!-- Initial Loading Overlay Component -->
        <loading-overlay v-if="store.isLoadingData && store.accessToken"></loading-overlay>

        <!-- Main Content -->
        <div v-else class="max-w-2xl mx-auto py-12 px-4 sm:px-6">
            
            <!-- Login State Check -->
            <login-form v-if="!store.accessToken"></login-form>

            <!-- Interview UI -->
            <div v-else class="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden relative min-h-[500px]">
                
                <!-- Burger Button -->
                <button 
                    v-if="!isMenuOpen && store.deck_id && store.currentStep !== -1"
                    @click="isMenuOpen = true"
                    class="absolute top-8 left-8 p-2 text-slate-400 hover:text-slate-600 z-10"
                >
                    <i class="fas fa-bars text-xl"></i>
                </button>

                <!-- Profile Widget -->
                <profile-widget v-if="!isMenuOpen"></profile-widget>

                <!-- Navigation Menu Inside Card -->
                <div v-if="isMenuOpen" class="p-8 h-full flex flex-col">
                    <div class="flex items-center justify-between mb-8">
                        <h2 class="text-2xl font-bold text-slate-900">Подборки вопросов</h2>
                        <button v-if="store.deck_id" @click="isMenuOpen = false" class="text-slate-400 hover:text-slate-600 p-2">
                            <i class="fas fa-times text-xl"></i>
                        </button>
                    </div>
                    
                    <nav class="space-y-3 flex-1 overflow-y-auto pr-1 custom-scrollbar">
                        <button 
                            v-for="deck in store.decks" 
                            :key="deck.id"
                            @click="selectDeck(deck.id)"
                            class="w-full text-left px-5 py-4 rounded-2xl text-sm font-medium border transition-all"
                            :class="store.deck_id === deck.id ? 'bg-blue-50 border-blue-200 text-blue-600 shadow-sm' : 'border-slate-100 hover:bg-slate-50 text-slate-600'"
                        >
                            <div class="flex items-center justify-between">
                                <span>{{ deck.name }}</span>
                                <i v-if="store.deck_id === deck.id" class="fas fa-check-circle"></i>
                            </div>
                        </button>
                    </nav>

                    <div class="mt-8 pt-6 border-t border-slate-100 space-y-3">
                        <button 
                            v-if="store.deck_id"
                            @click="isMenuOpen = false"
                            class="w-full py-4 px-6 rounded-xl bg-slate-900 text-white font-bold text-sm transition-all active:scale-95"
                        >
                            Продолжить
                        </button>
                        <button 
                            v-if="store.deck_id"
                            @click="store.resetSession"
                            class="w-full py-4 px-6 rounded-xl border border-red-100 text-red-500 font-bold text-sm hover:bg-red-50 transition-all"
                        >
                            Прервать сессию
                        </button>
                    </div>
                </div>

                <!-- Main Interview UI Components -->
                <div v-else-if="store.deck_id" class="flex flex-col h-full">
                    
                    <!-- Final Result Step -->
                    <div v-if="store.currentStep === -1" class="flex-1">
                        <result-step></result-step>
                    </div>

                    <!-- Intro Step -->
                    <div v-else-if="store.currentStep === 0" class="flex-1 flex flex-col h-full">
                        <instruction-step></instruction-step>
                    </div>

                    <!-- Interview Questions -->
                    <div v-else class="flex flex-col h-full">
                        <!-- Header -->
                        <div class="p-8 border-b border-slate-100 pt-8 text-center">
                            <h1 class="text-3xl font-bold text-slate-900 tracking-tight">{{ store.activeDeckName }}</h1>
                            <p class="text-slate-500 mt-1 font-bold text-[11px] uppercase tracking-widest">Интервью с {{ store.user.firstName }} (Баланс: {{ store.user.balance }})</p>
                            
                            <interview-steps></interview-steps>
                        </div>

                        <analysis-loader></analysis-loader>

                        <div class="p-8 space-y-8">
                            <question-section></question-section>
                            <answer-section></answer-section>

                            <div v-if="store.showResults" class="pt-10 border-t border-slate-100 space-y-12">
                                <results-section></results-section>
                                <improvement-plan></improvement-plan>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted, computed, watch } = Vue;
        const { createPinia, defineStore } = Pinia;

        const ROOT_URL = 'https://n.kushedow.tech/webhook/asql/interview/';
        const INITIAL_USER = { id: null, firstName: "", lastName: "", subscriptionId: "", balance: 0 };

        const useInterviewStore = defineStore('interview', {
            state: () => ({
                accessToken: "52ccbd5e-58fc-4306-aaae-4e6af4ec35ef", 
                user: { ...INITIAL_USER },
                deck_id: "1", 
                decks: [
                    { id: "1", name: "Скрининг" }, 
                    { id: "2", name: "Прошлый опыт" },
                    { id: "3", name: "Решение конфликтов" }, 
                    { id: "4", name: "Управление командой" },
                    { id: "5", name: "Профессиональное развитие" }
                ],
                currentStep: 0, // 0 - intro, -1 - final results
                userAnswer: "",
                userVoiceAnswer: null,
                inputFormat: 'text',
                isAnalyzing: false,
                isLoadingData: false,
                showResults: false,
                progress: 0,
                score: 0,
                questions: [],
                checklist: [],
                growthPlan: { keep: [], improve: [] },
                results: [] // Хранит { questionId, score, checklist: [] }
            }),
            getters: {
                currentQuestionObj: (state) => state.questions[state.currentStep - 1] || {},
                currentQuestionText: (state) => state.currentQuestionObj.text || "Загрузка вопроса...",
                activeDeckName: (state) => state.decks.find(d => d.id === state.deck_id)?.name || "Интервью"
            },
            actions: {
                async _fetchAuthorized(endpoint, payload = null, method = 'GET') {
                    const options = { method, headers: { 'Authorization': `Bearer ${this.accessToken}` } };
                    if (payload) {
                        options.headers['Content-Type'] = 'application/json';
                        options.body = JSON.stringify(payload);
                    }
                    const response = await fetch(`${ROOT_URL}${endpoint}`, options);
                    if (!response.ok) throw new Error(`API Error: ${response.status}`);
                    const text = await response.text();
                    return text ? JSON.parse(text) : {};
                },
                logout() { this.accessToken = null; this.user = { ...INITIAL_USER }; },
                resetSession() {
                    this.deck_id = null;
                    this.currentStep = 0;
                    this.results = [];
                    this.showResults = false;
                    this.userAnswer = "";
                    this.userVoiceAnswer = null;
                },
                async fetchProfile() {
                    try {
                        const data = await this._fetchAuthorized('profile');
                        const profile = Array.isArray(data) ? data[0] : data;
                        if (profile && Object.keys(profile).length > 0) {
                            this.user = { id: profile.user_id, firstName: profile.user_first_name, lastName: profile.user_last_name, subscriptionId: profile.user_subscription_id, balance: profile.user_balance };
                        }
                    } catch (error) { if (error.message.includes('403')) this.logout(); }
                },
                async fetchQuestions() {
                    if (!this.deck_id) return;
                    this.isLoadingData = true;
                    try {
                        const data = await this._fetchAuthorized(`questions?deck=${this.deck_id}`);
                        this.questions = Array.isArray(data) ? data : [];
                        this.results = []; // Очищаем старые результаты при смене колоды
                        this.updateChecklist();
                    } catch (error) { console.error(error); } finally { this.isLoadingData = false; }
                },
                updateChecklist() {
                    const current = this.currentQuestionObj;
                    if (current?.checklist) {
                        this.checklist = current.checklist.map(item => ({ ...item, passed: false, resultValue: 0 }));
                    } else {
                        this.checklist = [];
                    }
                },
                async analyzeAnswer() {
                    this.isAnalyzing = true;
                    this.showResults = false;
                    this.progress = 0;
                    const timer = setInterval(() => { if (this.progress < 90) this.progress += 2; }, 100);
                    try {
                        await this.processResults();
                        this.progress = 100;
                        await this.fetchProfile();
                    } catch (error) { 
                        console.error(error); 
                        alert("Ошибка анализа. Попробуйте снова.");
                    } finally { 
                        clearInterval(timer); 
                        this.isAnalyzing = false; 
                        this.showResults = true; 
                    }
                },
                async processResults() {
                    const current = this.currentQuestionObj;
                    const finalAnswer = this.inputFormat === 'text' ? this.userAnswer : this.userVoiceAnswer;

                    const data = await this._fetchAuthorized('review', {
                        deck_id: this.deck_id,
                        question_id: String(current.question_id),
                        question: current.text,
                        checklist: current.checklist ? current.checklist.map(c => `${c.label}: ${c.description}`) : [],
                        answer: finalAnswer,
                        format: this.inputFormat
                    }, 'POST');

                    if (data) {
                        // Если был голосовой ввод, сохраняем текстовую расшифровку в userAnswer
                        if (this.inputFormat === 'voice' && data.answer) {
                            this.userAnswer = data.answer;
                        }

                        if (data.review) {
                            this.checklist.forEach(item => {
                                const reviewItem = data.review.find(r => r.text && r.text.startsWith(item.label));
                                if (reviewItem) {
                                    item.resultValue = parseFloat(reviewItem.result) || 0;
                                    item.passed = item.resultValue >= 0.5;
                                }
                            });
                            this.growthPlan = data.growth_plan || { keep: [], improve: [] };
                            this.score = Math.round((data.review.reduce((acc, curr) => acc + (parseFloat(curr.result) || 0), 0) / data.review.length) * 100);

                            // Сохраняем результат текущего вопроса в историю
                            const resultIdx = this.results.findIndex(r => r.questionId === current.question_id);
                            const resultData = {
                                questionId: current.question_id,
                                questionText: current.text,
                                score: this.score,
                                checklist: JSON.parse(JSON.stringify(this.checklist))
                            };
                            
                            if (resultIdx !== -1) this.results[resultIdx] = resultData;
                            else this.results.push(resultData);
                        }
                    }
                },
                nextStep() {
                    this.userAnswer = ""; this.userVoiceAnswer = null; this.showResults = false;
                    if (this.currentStep < this.questions.length) { 
                        this.currentStep++; 
                        this.updateChecklist(); 
                    } else { 
                        this.currentStep = -1; // Переход к экрану финальных результатов
                    }
                }
            }
        });

        // --- COMPONENTS ---

        const LoadingOverlay = {
            template: `<div class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center space-y-4">
                <i class="fas fa-circle-notch fa-spin text-4xl text-blue-600"></i>
                <p class="text-xs text-slate-500 font-medium animate-pulse tracking-wide">Загрузка данных...</p>
            </div>`
        };

        const InstructionStep = {
            setup() {
                const store = useInterviewStore();
                return { startInterview: () => { store.currentStep = 1; store.updateChecklist(); } };
            },
            template: `
                <div class="p-8 h-full flex flex-col items-center justify-center space-y-10 min-h-[500px]">
                    <div class="text-center space-y-4">
                        <div class="flex justify-center">
                            <div class="w-16 h-16 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-600 mb-2">
                                <i class="fas fa-lightbulb text-2xl"></i>
                            </div>
                        </div>
                        <div class="space-y-2">
                            <h2 class="text-2xl font-bold text-slate-900 tracking-tight">Подготовка к интервью</h2>
                            <p class="text-xs text-slate-500 leading-relaxed max-w-xs mx-auto">Инструкции перед началом сессии.</p>
                        </div>
                    </div>
                    <div class="w-full max-w-sm space-y-6">
                        <div v-for="item in steps" :key="item.icon" class="flex items-center space-x-4">
                            <div :class="['w-10 h-10 flex-shrink-0 flex items-center justify-center rounded-full', item.bg, item.color]">
                                <i :class="['fas', item.icon, 'text-lg']"></i>
                            </div>
                            <p class="text-sm text-slate-700 font-medium">{{ item.text }}</p>
                        </div>
                    </div>
                    <button @click="startInterview" class="w-full max-w-md bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-[0.98]">
                        Начать
                    </button>
                </div>`,
            data() {
                return {
                    steps: [
                        { icon: 'fa-keyboard', bg: 'bg-blue-50', color: 'text-blue-600', text: 'Текст или голос для ответа' },
                        { icon: 'fa-robot', bg: 'bg-purple-50', color: 'text-purple-600', text: 'ИИ-анализ по чек-листу' },
                        { icon: 'fa-chart-line', bg: 'bg-emerald-50', color: 'text-emerald-600', text: 'Мгновенный фидбек' }
                    ]
                }
            }
        };

        const ResultStep = {
            setup() {
                const store = useInterviewStore();
                const restart = () => { store.currentStep = 1; store.results = []; store.updateChecklist(); };
                const changeDeck = () => store.resetSession();
                return { store, restart, changeDeck };
            },
            template: `
                <div class="p-8 space-y-8 flex flex-col h-full animate-in fade-in duration-500">
                    <div class="text-center space-y-3">
                        <div class="inline-flex items-center justify-center w-16 h-16 bg-emerald-50 text-emerald-600 rounded-full mb-2">
                            <i class="fas fa-trophy text-2xl"></i>
                        </div>
                        <h2 class="text-3xl font-bold text-slate-900 tracking-tight">Поздравляем!</h2>
                        <p class="text-sm text-slate-500">Вы успешно завершили подборку <b>"{{ store.activeDeckName }}"</b></p>
                    </div>

                    <div class="space-y-4 flex-1 overflow-y-auto max-h-[400px] pr-2 custom-scrollbar">
                        <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-4">Результаты по вопросам</h3>
                        <div v-for="(res, idx) in store.results" :key="idx" class="p-4 rounded-2xl border border-slate-100 bg-slate-50/50 space-y-3">
                            <div class="flex justify-between items-start gap-4">
                                <p class="text-sm font-semibold text-slate-800 leading-snug">{{ idx + 1 }}. {{ res.questionText }}</p>
                                <span class="px-2 py-1 rounded-lg bg-white border border-slate-100 text-xs font-black" 
                                    :class="res.score >= 70 ? 'text-emerald-600' : res.score >= 40 ? 'text-orange-500' : 'text-slate-500'">
                                    {{ res.score }}%
                                </span>
                            </div>
                            <div class="flex flex-wrap gap-1.5">
                                <span v-for="item in res.checklist" :key="item.label" 
                                    class="text-[9px] px-2 py-0.5 rounded-full border"
                                    :class="item.passed ? 'bg-emerald-50 border-emerald-100 text-emerald-700' : 'bg-slate-100 border-slate-200 text-slate-400'">
                                    {{ item.label }}
                                </span>
                            </div>
                        </div>
                    </div>

                    <div class="pt-6 border-t border-slate-100 grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <button @click="restart" class="py-4 px-6 rounded-xl bg-slate-900 text-white font-bold text-sm transition-all hover:bg-black active:scale-95">
                            <i class="fas fa-redo-alt mr-2 text-xs opacity-70"></i> Еще раз
                        </button>
                        <button @click="changeDeck" class="py-4 px-6 rounded-xl border border-slate-200 text-slate-600 font-bold text-sm transition-all hover:bg-slate-50 active:scale-95">
                            <i class="fas fa-layer-group mr-2 text-xs opacity-70"></i> Другая подборка
                        </button>
                    </div>
                </div>`
        };

        const LoginForm = {
            setup() {
                const store = useInterviewStore();
                const email = ref(''); const password = ref(''); const isLoggingIn = ref(false); const errorMessage = ref('');
                const handleLogin = async () => {
                    if (!email.value || !password.value) return;
                    isLoggingIn.value = true; errorMessage.value = '';
                    try {
                        const response = await fetch(`${ROOT_URL}auth`, {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email: email.value, password: password.value })
                        });
                        const data = await response.json();
                        if (response.ok) { store.accessToken = data.access_token; await Promise.all([store.fetchProfile(), store.fetchQuestions()]); }
                        else { errorMessage.value = data.error || 'Ошибка входа'; }
                    } catch { errorMessage.value = 'Сбой сети'; } finally { isLoggingIn.value = false; }
                };
                return { email, password, handleLogin, isLoggingIn, errorMessage };
            },
            template: `
                <div class="bg-white rounded-3xl shadow-xl border border-slate-200 p-8 sm:p-12 space-y-8">
                    <div class="text-center space-y-2">
                        <div class="w-16 h-16 bg-blue-50 rounded-2xl flex items-center justify-center mx-auto text-blue-600 mb-4">
                            <i class="fas fa-shield-halved text-2xl"></i>
                        </div>
                        <h2 class="text-3xl font-bold text-slate-900 tracking-tight">Вход</h2>
                    </div>
                    <div v-if="errorMessage" class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-xl text-xs font-medium flex items-center">
                        <i class="fas fa-exclamation-circle mr-2"></i> {{ errorMessage }}
                    </div>
                    <form @submit.prevent="handleLogin" class="space-y-4">
                        <input v-model="email" type="email" placeholder="Email" required class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none text-sm" />
                        <input v-model="password" type="password" placeholder="Пароль" required class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none text-sm" />
                        <button type="submit" :disabled="isLoggingIn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl flex justify-center">
                            <span v-if="!isLoggingIn">Войти</span>
                            <i v-else class="fas fa-circle-notch fa-spin"></i>
                        </button>
                    </form>
                </div>`
        };

        const ProfileWidget = {
            template: `<div class="absolute top-8 right-8">
                <button @click="store.logout" class="text-slate-300 hover:text-red-400 p-2"><i class="fas fa-sign-out-alt text-lg"></i></button>
            </div>`,
            setup() { return { store: useInterviewStore() }; }
        };

        const InterviewSteps = {
            template: `<nav class="mt-6 px-4 flex items-center justify-center space-x-2">
                <div v-for="n in store.questions.length" :key="n" class="w-8 h-8 rounded-lg flex items-center justify-center text-xs font-bold"
                    :class="[ n === store.currentStep ? 'bg-blue-600 text-white shadow-md shadow-blue-200' : n < store.currentStep ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-400' ]">
                    {{ n }}
                </div>
            </nav>`,
            setup() { return { store: useInterviewStore() }; }
        };

        const AnalysisLoader = {
            template: `<div v-if="store.isAnalyzing" class="border-b border-slate-100 bg-blue-50/30 p-4">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-[10px] font-bold text-blue-600 uppercase tracking-[0.2em] animate-pulse">ИИ анализирует...</span>
                    <span class="text-xs font-mono text-blue-600">{{ store.progress }}%</span>
                </div>
                <div class="w-full bg-slate-200 rounded-full h-1 overflow-hidden">
                    <div class="bg-blue-600 h-full transition-all duration-300" :style="{ width: store.progress + '%' }"></div>
                </div>
            </div>`,
            setup() { return { store: useInterviewStore() }; }
        };

        const QuestionSection = {
            template: `<section class="text-center min-h-[60px] flex items-center justify-center"><p class="text-xl font-semibold text-slate-900 leading-tight">"{{ store.currentQuestionText }}"</p></section>`,
            setup() { return { store: useInterviewStore() }; }
        };

        const AnswerSection = {
            template: `
                <section class="space-y-6">
                    <div class="flex space-x-1 bg-slate-100 p-1 rounded-xl">
                        <button @click="store.inputFormat = 'text'" class="flex-1 py-2 text-[10px] font-bold rounded-lg uppercase transition-all" :class="store.inputFormat === 'text' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500'">Текст</button>
                        <button @click="store.inputFormat = 'voice'" class="flex-1 py-2 text-[10px] font-bold rounded-lg uppercase transition-all" :class="store.inputFormat === 'voice' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500'">Голос</button>
                    </div>

                    <div v-if="store.inputFormat === 'text'" class="space-y-4">
                        <textarea v-model="store.userAnswer" :disabled="store.isAnalyzing" placeholder="Ваш ответ..." class="w-full h-44 p-5 rounded-2xl border border-slate-200 outline-none transition-all resize-none text-slate-700 bg-slate-50/50 text-sm leading-relaxed focus:border-blue-400"></textarea>
                    </div>

                    <div v-else class="py-12 flex flex-col items-center justify-center rounded-2xl border border-dashed" :class="store.userVoiceAnswer && !isRecording ? 'bg-emerald-50 border-emerald-300' : 'bg-slate-50/50 border-slate-300'">
                        <div v-if="!isRecording && !store.userVoiceAnswer" class="text-center space-y-4">
                            <button @click="startRecording" class="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto"><i class="fas fa-microphone text-2xl"></i></button>
                            <p class="text-xs font-medium text-slate-500">Нажмите для записи</p>
                        </div>
                        <div v-if="isRecording" class="text-center space-y-4 w-full px-12">
                            <button @click="stopRecording" class="w-16 h-16 bg-red-500 text-white rounded-full flex items-center justify-center mx-auto animate-pulse"><i class="fas fa-stop text-xl"></i></button>
                            <p class="text-[10px] font-bold text-red-500 uppercase tracking-widest">Запись: {{ recordingTime }}с</p>
                        </div>
                        <div v-if="store.userVoiceAnswer && !isRecording" class="text-center space-y-3 px-6 w-full">
                            <p class="text-[10px] font-bold text-emerald-700 uppercase">Голос записан</p>
                            <button @click="store.userVoiceAnswer = null" class="text-[10px] font-bold text-slate-400 hover:text-red-500 uppercase"><i class="fas fa-undo-alt mr-1"></i> Перезаписать</button>
                        </div>
                    </div>

                    <div v-if="store.showResults && store.inputFormat === 'voice' && store.userAnswer" class="p-4 bg-slate-50 rounded-xl border border-slate-100">
                         <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Распознанный ответ:</p>
                         <p class="text-sm text-slate-600 italic leading-relaxed">"{{ store.userAnswer }}"</p>
                    </div>

                    <button @click="store.analyzeAnswer" :disabled="isReadyToAnalyze" class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-slate-200 disabled:text-slate-400 text-white font-bold py-4 rounded-xl transition-all flex items-center justify-center space-x-2 active:scale-[0.98]">
                        <span>Анализ</span>
                        <i v-if="!store.isAnalyzing" class="fas fa-sparkles text-sm"></i>
                        <i v-else class="fas fa-circle-notch fa-spin text-sm"></i>
                    </button>
                </section>`,
            setup() {
                const store = useInterviewStore(); const isRecording = ref(false); const recordingTime = ref(0);
                const mediaRecorder = ref(null); const timerInterval = ref(null);
                const startRecording = async () => {
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        mediaRecorder.value = new MediaRecorder(stream);
                        const chunks = [];
                        mediaRecorder.value.ondataavailable = (e) => chunks.push(e.data);
                        mediaRecorder.value.onstop = () => {
                            const blob = new Blob(chunks, { type: 'audio/webm' });
                            const reader = new FileReader();
                            reader.onloadend = () => { store.userVoiceAnswer = reader.result; };
                            reader.readAsDataURL(blob);
                            stream.getTracks().forEach(track => track.stop());
                        };
                        mediaRecorder.value.start(); isRecording.value = true; recordingTime.value = 0;
                        timerInterval.value = setInterval(() => { recordingTime.value++; if (recordingTime.value >= 45) stopRecording(); }, 1000);
                    } catch (err) { alert("Нет доступа к микрофону"); }
                };
                const stopRecording = () => { if (mediaRecorder.value?.state !== 'inactive') mediaRecorder.value.stop(); isRecording.value = false; clearInterval(timerInterval.value); };
                const isReadyToAnalyze = computed(() => store.isAnalyzing || (store.inputFormat === 'text' ? (store.userAnswer || "").length < 5 : !store.userVoiceAnswer));
                return { store, isRecording, recordingTime, startRecording, stopRecording, isReadyToAnalyze };
            }
        };

        const ResultsSection = {
            setup() { const store = useInterviewStore(); const expanded = ref(null); return { store, expanded, toggle: (i) => expanded.value = expanded.value === i ? null : i }; },
            template: `
                <section>
                    <div class="flex items-baseline justify-between mb-8">
                        <h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">Результат</h2>
                        <span class="text-2xl font-black text-slate-900 tracking-tighter">{{ store.score }}%</span>
                    </div>
                    <div class="divide-y divide-slate-100">
                        <div v-for="(point, i) in store.checklist" :key="i" class="py-3">
                            <button @click="toggle(i)" class="w-full flex items-center justify-between text-left outline-none">
                                <span class="text-sm font-medium" :class="point.passed ? 'text-slate-900' : 'text-slate-400'">{{ point.label }}</span>
                                <span class="text-[10px] font-bold" :class="point.passed ? 'text-emerald-500' : 'text-slate-300'">{{ Math.round(point.resultValue * 100) }}%</span>
                            </button>
                            <div v-show="expanded === i" class="pt-2 pb-1 transition-all duration-300"><p class="text-xs text-slate-500 leading-relaxed">{{ point.description }}</p></div>
                        </div>
                    </div>
                </section>`
        };

        const ImprovementPlan = {
            template: `
                <section class="space-y-10">
                    <div class="grid grid-cols-1 gap-8">
                        <div v-for="type in ['keep', 'improve']" :key="type" class="space-y-4">
                            <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">{{ type === 'keep' ? 'Плюсы' : 'К доработке' }}</h3>
                            <ul class="space-y-2">
                                <li v-for="item in store.growthPlan[type]" class="text-xs text-slate-500 leading-relaxed flex items-start"><span :class="['mr-2', type === 'keep' ? 'text-emerald-500' : 'text-amber-500']">•</span> {{ item }}</li>
                            </ul>
                        </div>
                    </div>
                    <button @click="store.nextStep" class="w-full bg-slate-900 hover:bg-black text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-[0.98]">
                        {{ store.currentStep === store.questions.length ? 'Завершить' : 'Следующий вопрос' }}
                    </button>
                </section>`,
            setup() { return { store: useInterviewStore() }; }
        };

        const app = createApp({
            setup() {
                const store = useInterviewStore(); const isMenuOpen = ref(false);
                const selectDeck = (id) => { store.deck_id = id; store.fetchQuestions(); isMenuOpen.value = false; };
                watch(() => store.deck_id, (v) => { if (!v) isMenuOpen.value = true; }, { immediate: true });
                onMounted(async () => { if (store.accessToken) { await Promise.all([store.fetchProfile(), store.fetchQuestions()]); } });
                return { store, isMenuOpen, selectDeck };
            }
        });

        app.component('loading-overlay', LoadingOverlay); app.component('instruction-step', InstructionStep); app.component('result-step', ResultStep);
        app.component('login-form', LoginForm); app.component('profile-widget', ProfileWidget);
        app.component('interview-steps', InterviewSteps); app.component('analysis-loader', AnalysisLoader);
        app.component('question-section', QuestionSection); app.component('answer-section', AnswerSection);
        app.component('results-section', ResultsSection); app.component('improvement-plan', ImprovementPlan);
        app.use(createPinia()); app.mount('#app');
    </script>
</body>
</html>
